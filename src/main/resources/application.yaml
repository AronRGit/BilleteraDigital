spring:
  application:
    name: billetera

  datasource:
    url: jdbc:postgresql://postgres:5432/billetera_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

server:
  port: 8080

logging:
  level:
    com.portafolio.billetera: DEBUG
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 28800000