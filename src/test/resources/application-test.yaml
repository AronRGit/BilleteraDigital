# =====================================================
# application-test.yaml
# Configuración exclusiva para tests de integración.
#
# Usa H2 en memoria: NO necesita Docker ni PostgreSQL.
# Se activa automáticamente con @ActiveProfiles("test")
# =====================================================

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false  # Hibernate gestiona el esquema en tests
