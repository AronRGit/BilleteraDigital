version: '3.8'

# =====================================================
# docker-compose.yml — Mini Core Bancario
#
# Dockeriza toda la aplicación: BD + App Java
#
# Comandos:
#   Construir y levantar:  docker compose up --build -d
#   Ver logs:              docker compose logs -f
#   Ver logs solo app:     docker compose logs -f app
#   Detener:               docker compose stop
#   Eliminar todo:         docker compose down -v
# =====================================================

services:

  # ── Base de datos ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: billetera_db
    environment:
      POSTGRES_DB: billetera_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"   # 5433 en host para no chocar con PostgreSQL local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billetera_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Aplicación Spring Boot ──────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billetera_app
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: billetera_postgres_data